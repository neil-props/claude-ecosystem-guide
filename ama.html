<style>

    --bg: #f5f5f7;

  html.theme-transition,
  html.theme-transition *,
  html.theme-transition *::before,
  html.theme-transition *::after {
    transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease !important;

  body {

    color: var(--text);

</style>
<script>
  // Apply theme BEFORE paint to prevent flash
  (function() {
    var stored = localStorage.getItem('claude-guide-theme');
    var theme;
    if (stored === 'light' || stored === 'dark') {
      theme = stored;
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      theme = 'light';
    } else {
      theme = 'dark';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();

<script>

// THEME TOGGLE
// ════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  html.classList.add('theme-transition');
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('claude-guide-theme', next);
  // Remove transition class after animation completes
  setTimeout(() => html.classList.remove('theme-transition'), 350);
}

// Listen for system theme changes (only if user hasn't set a preference)
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
  if (!localStorage.getItem('claude-guide-theme')) {
    document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark');
  }
});

const QA = [
  // ── GETTING STARTED ──
  {
    id: "gs-01", cat: "getting-started",
    q: "What is the Claude ecosystem and what are its main components?",
    alt: ["overview of claude tools", "what claude products exist", "claude ecosystem overview"],
    tags: ["overview", "intro"],
    related: ["gs-02", "gs-03"],
    a: `The Claude ecosystem has **three main interfaces** and a shared **extension layer**:

**Interfaces:**
- **Claude Chat** (claude.ai) — Web/desktop/mobile app for everyone. Conversational AI with file uploads, web search, Projects, Connectors, and Interactive Apps.
- **Claude Code** — Agentic CLI for developers. Full filesystem access, git integration, bash execution, parallel subagents. Lives in your terminal, VS Code, or JetBrains.
- **Claude Cowork** — Desktop agent for knowledge workers. Autonomous file processing, reports, spreadsheets. Uses coordinator + sub-agent architecture. Launched Jan 2026.

**Shared Extension Layer:**
- **MCP/Connectors** — Connect to external services (Slack, Asana, databases)
- **Skills** — Portable instruction sets (same format across all 3 interfaces)
- **Plugins** — Installable bundles (skills + connectors + agents). Primary in Cowork + Code
- **Projects/CLAUDE.md** — Persistent context and instructions
- **Hooks** — Event-driven automation (Code only)
- **Subagents** — Specialized AI assistants (Code + Cowork)`
  },
  {
    id: "gs-02", cat: "getting-started",
    q: "How do I decide whether to use Claude Code, Claude Chat, or Claude Cowork?",
    alt: ["which claude should I use", "code vs chat vs cowork", "when to use which claude tool", "difference between code chat cowork"],
    tags: ["comparison", "choosing"],
    related: ["gs-01", "cc-01", "cw-01"],
    a: `Here's a quick decision framework:

**Use Claude Chat when:**
- You need a quick answer, brainstorm, or document analysis
- You're uploading files for review (PDFs, images, data)
- You want to use Interactive Apps (Slack, Figma embedded in chat)
- Non-technical tasks: writing, research, strategy

**Use Claude Code when:**
- You're writing, debugging, or refactoring code
- You need multi-file edits across a codebase
- You want git automation (commits, PRs, branch workflows)
- You need CI/CD integration (GitHub Actions, GitLab)
- You're a developer working in a terminal or IDE

**Use Claude Cowork when:**
- You need to batch-process files (invoices, reports, data cleanup)
- You want to describe an outcome and step away while it works
- The task involves non-code files (spreadsheets, presentations, docs)
- You want plugin-based workflows (Sales, Finance, Legal)
- You're not a developer but need agent-level automation

**Rule of thumb:** Code = developer tasks. Chat = quick conversations. Cowork = autonomous knowledge work.`
  },

    q: "How do I install and set up Claude Code for the first time?",
    alt: ["install claude code", "claude code setup", "getting started with claude code CLI", "how to get claude code"],

    related: ["cc-01", "cc-03"],
    a: `**Install globally via npm:**
\`\`\`bash
npm install -g @anthropic-ai/claude-code
\`\`\`

**Start the authentication flow:**
\`\`\`bash
claude
\`\`\`

This opens a browser window to authenticate with your Anthropic account. Takes about 30 seconds.

**Key first steps after install:**
1. Navigate to your project directory
2. Run \`claude\` to start a session
3. Create a \`CLAUDE.md\` at your repo root with project context (conventions, tech stack, etc.)

**IDE integrations:**
- **VS Code:** Install the Claude Code extension from the marketplace
- **JetBrains:** Available as a plugin for IntelliJ, PyCharm, WebStorm, etc.

    tags: ["overview", "intro"],
    related: ["mcp-02", "mcp-03"],
    a: `**MCP (Model Context Protocol)** is an open standard that connects AI models to external tools and services. Think of it as the **"USB-C of AI"** — a universal connector.

**Why it matters:**
- **Vendor-neutral:** Works with Claude, ChatGPT, Gemini, and others
- **Open standard:** Donated to Linux Foundation (Dec 2025), backed by Google, Microsoft, AWS, OpenAI
- **Universal:** Same MCP server works across Claude Code, Chat, and Cowork
- **Growing ecosystem:** Thousands of community servers, 50+ built-in connectors

**What MCP enables:**
- Connect Claude to your databases (PostgreSQL, MySQL, MongoDB)
- Integrate with project tools (Jira, Asana, Linear, GitHub)
- Access communication platforms (Slack, email)
- Query internal APIs and services
- Render interactive UIs inside conversations (MCP Apps extension)

**The protocol:**
- JSON-RPC 2.0 based
- Transport: stdio (local) or HTTP (remote)
- Servers expose: **tools** (actions), **resources** (data), and **prompts** (templates)
- 97M+ monthly SDK downloads`

# With environment variables

  --env DB_URL=postgresql://localhost/mydb
\`\`\`

- **Project**: \`.mcp.json\` — checked into git, shared with team
- **User**: \`~/.claude.json\` globally — all your projects

    tags: ["development", "custom"],
    related: ["mcp-01", "mcp-02"],
    a: `**Using the TypeScript SDK:**

**Minimal server example:**
\`\`\`typescript
import { Server } from "@modelcontextprotocol/sdk/server";
import { StdioServerTransport } from "@modelcontextprotocol/sdk/server/stdio";

const server = new Server({ name: "my-server", version: "1.0.0" }, {
  capabilities: { tools: {} }
});

server.setRequestHandler("tools/list", async () => ({
  tools: [{
    name: "get_user",
    description: "Look up a user by email",
    inputSchema: {
      type: "object",
      properties: { email: { type: "string" } },
      required: ["email"]
    }
  }]
}));

server.setRequestHandler("tools/call", async (req) => {
  if (req.params.name === "get_user") {
    const user = await myApi.getUser(req.params.arguments.email);
    return { content: [{ type: "text", text: JSON.stringify(user) }] };
  }
});

new StdioServerTransport().connect(server);
\`\`\`

\`\`\`bash
# Run the server command manually to see errors
npx @example/mcp-server
\`\`\`

**Step 3: Check environment variables**
MCP servers often need env vars (API keys, tokens). Make sure they're set:
\`\`\`bash
echo $GITHUB_TOKEN  # Check if it's set
\`\`\`

**Step 4: Check logs**
Claude Code logs MCP interactions. Look for errors in the session output.

**Common issues:**
- **"Server not found"** — Check the command path. Try running it manually.
- **"Connection timeout"** — Server is slow to start. Increase timeout in config.
- **"Auth error"** — Missing or expired API token in env vars.
- **"Tool not available"** — Server connected but tool not exposed. Check server's tool list.
- **SSE deprecated** — Use HTTP transport instead of SSE for remote servers.

**Nuclear option:**
\`\`\`bash

\`\`\``

    related: ["sk-02", "sk-03"],
    a: `**Skills** are the universal primitive of the Claude ecosystem. They're portable instruction sets (SKILL.md files) that teach Claude specific processes.

**Key facts:**

- **Open standard** — published at agentskills.io (Dec 2025)
- **Auto-invoked** — Claude reads metadata and activates relevant skills automatically (progressive disclosure)
- **Launched:** Oct 16, 2025, simultaneously across all surfaces

**A skill is just a folder:**
\`\`\`
my-skill/
├── SKILL.md       ← Instructions + YAML frontmatter
├── template.xlsx  ← Supporting files (optional)
└── examples/      ← Reference examples (optional)
\`\`\`

**How they're used per interface:**
- **Chat:** Settings → Capabilities → Skills. Claude auto-invokes. Built-in: Excel, PowerPoint, Word, PDFs.
- **Code:** \`.claude/skills/\` directory. Also invocable via \`/skill-name\`. Extra: frontmatter for model, tools, hooks.
- **Cowork:** Bundled inside plugins or standalone via Customize menu.

2. Write the SKILL.md:
\`\`\`markdown
---
name: quarterly-report
description: Generate formatted quarterly financial reports from raw data
allowed-tools: Read, Write, Bash
model: sonnet
---
# Quarterly Report Generator

## Steps
1. Read the raw data file from the path provided by the user
2. Calculate key metrics: revenue, expenses, profit margin, YoY growth
3. Format into a markdown table with section headers
4. Write the output to reports/Q{quarter}-{year}.md

## Format Requirements
- Use USD formatting with commas
- Include percentage changes with arrows (↑/↓)
- Add an executive summary at the top (3-5 bullet points)

3. Use it: \`/quarterly-report Q4 2025 data.csv\`

**In Claude Chat:**
- Use the "skill-creator" skill in conversation
- Or upload a SKILL.md via Settings → Capabilities → Skills

**Frontmatter options:**
- \`description\` — When to auto-invoke (critical for progressive disclosure)
- \`allowed-tools\` — Restrict tool access
- \`model\` — Override model (opus, sonnet, haiku)
- \`context: fork\` — Run in isolated subagent
- \`disable-model-invocation: true\` — Only manual invocation`

    q: "What is the difference between Skills, Commands, and Hooks?",
    alt: ["skills vs commands vs hooks", "difference between skills and hooks", "when to use skills vs hooks"],
    tags: ["comparison"],
    related: ["sk-01", "hk-01"],
    a: `Three different extension types for different purposes:

**Skills** = "How to do something"
- Portable instruction sets (SKILL.md files)
- Work across Chat, Code, and Cowork
- Auto-invoked by Claude based on task context
- Can also be manually triggered via \`/skill-name\`
- Example: "How to generate a quarterly report"

**Commands** = Legacy version of Skills (Code only)
- Markdown files in \`.claude/commands/\`
- Always user-invoked (never auto-triggered)
- Now merged into the Skills system
- Still work for backward compatibility
- **Recommendation: use Skills instead**

**Hooks** = "When something happens, do this"
- Event-driven automation (Code only)
- Run shell scripts, call APIs, invoke Claude
- Triggered by lifecycle events (PreToolUse, SessionStart, etc.)
- NOT user-invocable — they fire automatically
- Example: "Auto-lint after every file edit"

**Key distinction:** Skills teach Claude *what* to do. Hooks automate *when* to react. Skills are about instructions; hooks are about events.`

  {
    id: "hk-01", cat: "hooks",
    q: "What are Hooks and when should I use them?",
    alt: ["hooks explained", "what are hooks", "claude code hooks overview", "event automation"],
    tags: ["overview", "intro"],
    related: ["hk-02", "sk-03"],
    a: `**Hooks** are event-driven automation in Claude Code. They run code at specific lifecycle points — think of them as "triggers" that fire when things happen.

**Use hooks when you want to:**
- Auto-lint code after Claude edits a file
- Block certain operations (e.g., no commits to main)
- Log all tool usage for compliance/auditing
- Validate user prompts before processing
- Notify Slack when a session starts
- Run custom checks before tool execution

**Hook events (16+):**
- \`SessionStart\` / \`SessionEnd\`
- \`UserPromptSubmit\` — before Claude processes input
- \`PreToolUse\` / \`PostToolUse\` — before/after any tool call
- \`PermissionRequest\` — custom approval logic
- \`SubagentStart\` / \`SubagentStop\`
- \`PreCompact\` — before context compression
- And more...

**Hook types:**
- **Command** — run a shell script
- **HTTP** — POST to an endpoint
- **Prompt** — single-turn LLM evaluation
- **Agent** — multi-turn agentic verification

**Availability:** Claude Code only (not Chat or Cowork).`
  },
  {
    id: "hk-02", cat: "hooks",
    q: "How do I set up a Hook in Claude Code?",
    alt: ["configure hook", "hook setup", "add hook", "hooks settings.json"],
    tags: ["setup", "config"],
    related: ["hk-01", "hk-03"],
    a: `**Add hooks to your settings file:**

\`\`\`json
// .claude/settings.json (project-level)
{
  "hooks": {
    "PostToolUse": [
      {
        "matcher": "Edit|Write",
        "type": "command",
        "command": "npx eslint --fix $CLAUDE_FILE_PATH"
      }
    ],
    "PreToolUse": [
      {
        "matcher": "Bash",
        "type": "command",
        "command": "echo 'Bash command about to run: $CLAUDE_TOOL_INPUT'"
      }
    ],
    "SessionStart": [
      {
        "type": "command",
        "command": "echo 'Session started at $(date)' >> ~/.claude/session.log"
      }
    ]
  }
}
\`\`\`

**Exit codes matter:**
- \`exit 0\` — Allow / proceed
- \`exit 2\` — **Block** the action (stderr shown as feedback)
- Other — Proceed (stderr logged but not shown)

**Blocking example** (prevent commits to main):
\`\`\`json
{
  "PreToolUse": [{
    "matcher": "Bash",
    "type": "command",
    "command": "if echo $CLAUDE_TOOL_INPUT | grep -q 'git commit.*main'; then echo 'Blocked: no direct commits to main' >&2; exit 2; fi"
  }]
}
\`\`\`

**Async hooks** (non-blocking background tasks):
\`\`\`json
{ "type": "command", "command": "curl ...", "async": true }
\`\`\``

    id: "wf-04", cat: "workflows",
    q: "How should I structure prompts for complex multi-step tasks?",
    alt: ["prompt engineering", "complex prompts", "multi step tasks", "how to prompt claude code"],
    tags: ["prompts", "tips"],
    related: ["wf-01"],
    a: `**The STAR method for complex prompts:**

**S — Situation:** What's the current state?
**T — Task:** What do you want accomplished?
**A — Approach:** Any constraints or preferences?
**R — Result:** What does "done" look like?

**Example:**
\`\`\`
Situation: We have a REST API with Express that handles user management.
The auth middleware is in src/middleware/auth.ts.

Task: Add rate limiting to all API endpoints. Use a sliding window
algorithm with Redis.

Approach:
- Use the 'rate-limiter-flexible' package
- Different limits per route tier (public: 100/min, auth: 500/min)
- Follow our existing middleware patterns in src/middleware/
- Add tests using our Vitest setup

Result: All endpoints rate-limited, tests passing, README updated
with the rate limit values.
\`\`\`

**Anti-patterns to avoid:**
- "Fix the code" (too vague)
- "Refactor everything to be better" (no clear scope)
- Giving one instruction at a time (let Claude plan the full task)

**Pro tip:** If the task is truly large, use extended thinking (\`/model opus\`) and let Claude create a plan first before executing.`

  // ── SECURITY ──
  {
    id: "sec-01", cat: "security",
    q: "What data does Claude Code read from my filesystem?",
    alt: ["filesystem access", "what files does claude read", "file access scope"],
    tags: ["privacy", "filesystem"],
    related: ["gs-05", "sec-02"],
    a: `**Claude Code reads files on-demand, not proactively.**

**What it reads:**
- Files you explicitly mention or ask about
- Files it determines are relevant while working on your task
- \`CLAUDE.md\` and \`.claude/\` configuration files (at session start)
- Git status and diff information

**What it does NOT do:**
- Scan your entire filesystem on startup
- Read files outside the current project directory (by default)
- Access \`.env\` files unless you ask (and it warns you)
- Upload your codebase to any external service

**Controls:**
- Use \`.gitignore\` patterns — Claude respects them
- Set \`allowed-tools: Read, Grep\` in skill frontmatter to limit writes
- Use \`plan\` permission mode for read-only exploration
- Configure \`claudeMdExcludes\` to skip certain CLAUDE.md files

**Key principle:** Claude Code has the *ability* to read any file you have access to, but it only reads files relevant to the current task.`

{ "PreToolUse": [{

**3. Use MCP env var expansion:**
\`\`\`json
{ "env": { "DB_URL": "\${DATABASE_URL}" } }

**4. On paid plans:**

- Enterprise plans: data retention controls, SSO, audit logs

    a: `**Claude Code's default permission model:**

**Always allowed (no prompt):**
- Read files
- Search files (Grep, Glob)
- Read git status/log/diff

**Requires approval:**
- Edit/Write files
- Run bash commands
- Create git commits
- MCP tool calls

**Never done without explicit request:**
- Force push (\`git push --force\`)
- Delete branches (\`git branch -D\`)
- \`rm -rf\` or destructive operations
- Sending data to external services

**Override with permission modes:**
- \`default\` — Standard (prompt for writes/bash)
- \`acceptEdits\` — Auto-approve file edits
- \`plan\` — Read-only, no modifications
- \`bypassPermissions\` — Skip all checks (use carefully)

**Hooks add another layer:**
\`PreToolUse\` hooks can block any tool call before it executes, based on custom logic (regex matching, script evaluation).

**Managed settings** (enterprise) can enforce permission modes org-wide and override user preferences.`

// ════════════════════════════════════════
// FUSE SETUP
// ════════════════════════════════════════
const fuse = new Fuse(QA, {
  keys: [
    { name: 'q', weight: 0.4 },
    { name: 'alt', weight: 0.35 },
    { name: 'tags', weight: 0.15 },
    { name: 'a', weight: 0.1 }
  ],
  threshold: 0.45,
  distance: 300,
  includeScore: true,
  minMatchCharLength: 2,
  shouldSort: true
});

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let sessionHistory = [];
let activeCat = 'all';

// ════════════════════════════════════════
// GREETINGS
// ════════════════════════════════════════
const greetings = [
  "Hey! I can answer questions about Claude Code, Chat, Cowork, MCP, Skills, Plugins, Hooks, and more. Try a suggestion below or type your own.",
  "Welcome! Ask me anything about the Claude ecosystem — interfaces, extensions, workflows, troubleshooting. I have 100+ pre-built answers ready.",
  "Hi there! I'm your team's Claude ecosystem guide. What would you like to know? You can browse categories above or just ask.",
  "Ready to help! Whether it's MCP setup, Skills vs Plugins, or getting started with Cowork — just ask."
];

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const greeting = greetings[Math.floor(Math.random() * greetings.length)];
  addBotMessage(greeting, getRandomSuggestions('all', 4));
  setupInput();
  setupCategoryPills();
});

function setupInput() {
  const input = document.getElementById('inputField');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
  // Auto-resize
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
}

function setupCategoryPills() {
  document.querySelectorAll('.cat-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeCat = pill.dataset.cat;
      const suggestions = getRandomSuggestions(activeCat, 5);
      if (activeCat === 'all') {
        addBotMessage("Showing suggestions from all categories:", suggestions);
      } else {
        const catLabel = pill.textContent;
        addBotMessage(`Here are some questions about **${catLabel}**:`, suggestions);
      }
    });
  });
}

// ════════════════════════════════════════
// SEND
// ════════════════════════════════════════
function handleSend() {
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  askQuestion(text);
}

function askQuestion(text) {
  addUserMessage(text);
  sessionHistory.push(text);

  // Show typing indicator
  const typingId = showTyping();

  // Simulate thinking delay
  const delay = 300 + Math.random() * 400;
  setTimeout(() => {
    removeTyping(typingId);
    processQuestion(text);
  }, delay);
}

// ════════════════════════════════════════
// PROCESS
// ════════════════════════════════════════
function processQuestion(text) {
  // Easter eggs
  const lower = text.toLowerCase();
  if (lower.includes('meaning of life') || lower === '42') {
    addBotMessage("42. But if you're asking about Claude's meaning, it's to help your team ship better work faster. What Claude question can I help with?");
    return;
  }
  if (lower.includes('tell me a joke') || lower === 'joke') {
    addBotMessage("Why do programmers prefer dark mode? Because light attracts bugs. Anyway, what Claude question can I help with?");
    return;
  }

  const results = fuse.search(text);

  if (results.length === 0) {
    showNoResults(text);
    return;
  }

  const best = results[0];

  if (best.score <= 0.15) {
    // High confidence
    showAnswer(best.item);
  } else if (best.score <= 0.35) {
    // Medium confidence
    showAnswer(best.item, true);
  } else {
    // Low confidence — show "did you mean?"
    showDidYouMean(results.slice(0, 3).map(r => r.item), text);
  }
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function showAnswer(entry, hedged = false) {
  let text = '';
  if (hedged) {
    const hedges = [
      `I think you're asking about **${entry.q.toLowerCase()}** — here's what I know:`,
      `This might be what you're looking for:`,
      `Based on your question, here's the most relevant answer:`
    ];
    text = hedges[Math.floor(Math.random() * hedges.length)] + '\n\n';
  }
  text += entry.a;

  // Get related questions
  const related = (entry.related || [])
    .map(id => QA.find(q => q.id === id))
    .filter(Boolean)
    .map(q => q.q);

  addBotMessage(text, related.length > 0 ? related : null, true);
}

function showDidYouMean(candidates, originalQ) {
  const inner = document.createElement('div');

  const preamble = document.createElement('p');
  preamble.textContent = "Hmm, I want to make sure I answer the right thing. Were you asking about one of these?";
  inner.appendChild(preamble);

  const list = document.createElement('ul');
  list.className = 'dym-list';
  candidates.forEach(c => {
    const li = document.createElement('li');
    li.textContent = c.q;
    li.onclick = () => {
      addUserMessage(c.q);
      const tid = showTyping();
      setTimeout(() => {
        removeTyping(tid);
        showAnswer(c);
      }, 300);
    };
    list.appendChild(li);
  });
  inner.appendChild(list);

  const fallback = document.createElement('p');
  fallback.style.cssText = 'margin-top:.75rem;font-size:.82rem;color:var(--text-muted)';
  fallback.textContent = 'Not what you meant? Try rephrasing or browse by category above.';
  inner.appendChild(fallback);

  addBotMessageEl(inner);
}

function showNoResults(text) {
  const inner = document.createElement('div');

  const p1 = document.createElement('p');
  p1.textContent = "I don't have a pre-built answer for that one yet. Here's what you can try:";
  inner.appendChild(p1);

  const ul = document.createElement('ul');
  ul.style.cssText = 'margin:.5rem 0;padding-left:1.25rem';
  ['Browse by category using the pills above', 'Try rephrasing with different keywords', 'Check docs.anthropic.com or code.claude.com/docs'].forEach(t => {
    const li = document.createElement('li');
    li.textContent = t;
    li.style.cssText = 'margin:.25rem 0;font-size:.88rem';
    ul.appendChild(li);
  });
  inner.appendChild(ul);

  // API fallback option
  const apiSection = document.createElement('div');
  apiSection.className = 'api-section';
  apiSection.innerHTML = `
    <p>Or ask Claude directly with your API key (sent only to Anthropic, not stored):</p>
    <div class="api-row">
      <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-..." value="${sessionStorage.getItem('claude_key') || ''}">
      <button class="api-btn" onclick="askClaude('${text.replace(/'/g, "\\'")}')">Ask Claude</button>
    </div>
  `;
  inner.appendChild(apiSection);

  addBotMessageEl(inner);
}

// ════════════════════════════════════════
// CLAUDE API FALLBACK
// ════════════════════════════════════════
async function askClaude(question) {
  const keyInput = document.getElementById('apiKeyInput');
  const key = keyInput.value.trim();
  if (!key) { keyInput.focus(); return; }

  sessionStorage.setItem('claude_key', key);
  const typingId = showTyping();

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: `You are a helpful assistant that answers questions about the Anthropic Claude ecosystem. You know about:
- Claude Code (agentic CLI for developers), Claude Chat (claude.ai web/desktop), Claude Cowork (desktop agent for knowledge workers)
- MCP (Model Context Protocol), Skills (portable SKILL.md files), Plugins (bundled packages), Hooks (event automation), Subagents, Projects/CLAUDE.md
- The customization stack: MCP (transport) → Skills (instruction) → Plugins (product)
- Skills work across all 3 interfaces. Plugins are primarily Cowork + Code.
Answer concisely with practical examples. Use markdown formatting.`,
        messages: [{ role: 'user', content: question }]
      })
    });

    removeTyping(typingId);

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      addBotMessage(`**API Error (${resp.status}):** ${err.error?.message || 'Check your API key and try again.'}`);
      return;
    }

    const data = await resp.json();
    const answer = data.content?.[0]?.text || 'No response received.';
    addBotMessage(answer + '\n\n*— Answered live by Claude API*', null, true);
  } catch (e) {
    removeTyping(typingId);
    addBotMessage(`**Connection error:** ${e.message}. Check your network and API key.`);
  }
}

// ════════════════════════════════════════
// DOM HELPERS
// ════════════════════════════════════════
function addUserMessage(text) {
  const chat = document.getElementById('chatInner');
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `
    <div class="msg-avatar">Y</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  chat.appendChild(msg);
  scrollToBottom();
}

function addBotMessage(markdown, suggestions = null, showFeedback = false) {
  const chat = document.getElementById('chatInner');
  const msg = document.createElement('div');
  msg.className = 'msg bot';

  let html = `<div class="msg-avatar">C</div><div class="msg-bubble">`;
  html += marked.parse(markdown);

  if (showFeedback) {
    html += `<div class="feedback">
      <span style="font-size:.72rem;color:var(--text-muted)">Helpful?</span>
      <button class="fb-btn" onclick="this.classList.add('selected')">Yes</button>
      <button class="fb-btn" onclick="logUnhelpful(this)">No</button>
    </div>`;
  }

  html += `</div>`;
  msg.innerHTML = html;

  if (suggestions && suggestions.length > 0) {
    const sugDiv = document.createElement('div');
    sugDiv.className = 'suggestions';
    sugDiv.style.marginLeft = '38px';
    suggestions.forEach(s => {
      const chip = document.createElement('button');
      chip.className = 'sug-chip';
      chip.textContent = s;
      chip.onclick = () => askQuestion(s);
      sugDiv.appendChild(chip);
    });
    const wrapper = document.createElement('div');
    wrapper.appendChild(msg);
    wrapper.appendChild(sugDiv);
    chat.appendChild(wrapper);
  } else {
    chat.appendChild(msg);
  }

  scrollToBottom();
}

function addBotMessageEl(contentEl) {
  const chat = document.getElementById('chatInner');
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'C';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.appendChild(contentEl);
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  scrollToBottom();
}

function showTyping() {
  const chat = document.getElementById('chatInner');
  const id = 'typing-' + Date.now();
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = id;
  msg.innerHTML = `
    <div class="msg-avatar">C</div>
    <div class="msg-bubble" style="padding:0">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  `;
  chat.appendChild(msg);
  scrollToBottom();
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  requestAnimationFrame(() => {
    area.scrollTop = area.scrollHeight;
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function getRandomSuggestions(cat, count) {
  const pool = cat === 'all' ? QA : QA.filter(q => q.cat === cat);
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count).map(q => q.q);
}

function logUnhelpful(btn) {
  btn.classList.add('selected');
  // Store in localStorage for maintainer review
  const unanswered = JSON.parse(localStorage.getItem('ama_unhelpful') || '[]');
  const lastQ = sessionHistory[sessionHistory.length - 1];
  if (lastQ) unanswered.push({ q: lastQ, time: new Date().toISOString() });
  localStorage.setItem('ama_unhelpful', JSON.stringify(unanswered));
}

// Admin view: Ctrl+Shift+A
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.shiftKey && e.key === 'A') {
    const data = JSON.parse(localStorage.getItem('ama_unhelpful') || '[]');
    if (data.length === 0) {
      addBotMessage('**Admin:** No unhelpful feedback logged yet.');
    } else {
      let md = '**Admin — Unhelpful Feedback Log:**\n\n';
      data.forEach((d, i) => { md += `${i + 1}. "${d.q}" — ${d.time}\n`; });
      addBotMessage(md);
    }
  }
});
</script>
